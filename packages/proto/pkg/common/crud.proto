syntax = "proto3";

enum LogicalOperator {
  eq = 0;
  ne = 1;
  eqs = 2;
  nes = 3;
  lt = 4;
  gt = 5;
  lte = 6;
  gte = 7;
  in = 8;
  nin = 9;
  ina = 10;
  nina = 11;
  contains = 12;
  ncontains = 13;
  containss = 14;
  ncontainss = 15;
  between = 16;
  nbetween = 17;
  null = 18;
  nnull = 19;
  startswith = 20;
  nstartswith = 21;
  startswiths = 22;
  nstartswiths = 23;
  endswith = 24;
  nendswith = 25;
  endswiths = 26;
  nendswiths = 27;
}

enum ConditionalOperator {
  or = 0;
  and = 1;
}

enum Sort {
  asc = 0;
  desc = 1;
}

message LogicalFilter {
  string field = 1;
  LogicalOperator operator = 2;

  oneof value {
    string string = 3;
    int32 number = 4;
    bool boolean = 5;
  }
}

message ConditionalFilter {
  optional string key = 1;
  ConditionalOperator operator = 2;
  repeated LogicalFilter value = 3;
}

message Sorter {
  string field = 1;
  Sort order = 2;
}
