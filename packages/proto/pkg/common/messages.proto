syntax = "proto3";

import "google/protobuf/timestamp.proto";

import "common/crud.proto";

message Entity {
  string id = 1;
  google.protobuf.Timestamp createdAt = 2;
  optional google.protobuf.Timestamp updatedAt = 3;
}

message Query {
  optional string id = 1;
  repeated string ids = 2;
}

message Get {
  Query query = 1;
}

message Pagination {
  optional int32 page = 1;
  optional int32 limit = 2;
}

message GetList {
  repeated LogicalFilter logicalFilters = 1;
  repeated ConditionalFilter conditionalFilters = 2;
  repeated Sorter sorters = 3;
  optional Pagination pagination = 4;
}
