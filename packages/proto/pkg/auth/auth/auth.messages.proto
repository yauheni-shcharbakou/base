syntax = "proto3";

package auth.auth;

import "auth/user/user.proto";
import "google/protobuf/timestamp.proto";

message AuthLogin {
  string login = 1;
  string password = 2;
}

message AuthMe {
  string accessToken = 1;
}

message AuthRefresh {
  string refreshToken = 1;
}

message AuthToken {
  string value = 1;
  google.protobuf.Timestamp expiredAt = 2;
}

message AuthTokens {
  AuthToken accessToken = 1;
  AuthToken refreshToken = 2;
}

message AuthData {
  user.User user = 1;
  AuthTokens tokens = 2;
}
