syntax = "proto3";

package auth.models;

import "google/protobuf/timestamp.proto";

message TempCode {
  string id = 1;
  google.protobuf.Timestamp createdAt = 2;
  optional google.protobuf.Timestamp updatedAt = 3;

  string userId = 4;
  string code = 5;
  bool isActive = 6;
  google.protobuf.Timestamp expiredAt = 7;
}
