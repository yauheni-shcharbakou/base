syntax = "proto3";

package auth;

import "common/service.proto";
import "auth/models/temp-code.proto";
import "auth/messages/temp-code.messages.proto";

service TempCodeService {
  rpc getById (common.IdField) returns (models.TempCode) {}
  rpc getList (common.GetListRequest) returns (messages.TempCodeGetListResponse) {}
  rpc createOne (messages.TempCodeCreate) returns (models.TempCode) {}
  rpc deleteById (common.IdField) returns (models.TempCode) {}
}
