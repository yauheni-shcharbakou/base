syntax = "proto3";

package storage.storage_object;

import "google/protobuf/timestamp.proto";

enum StorageObjectType {
  FOLDER = 0;
  FILE = 1;
  IMAGE = 2;
  VIDEO = 3;
}

message StorageObject {
  string id = 1;
  google.protobuf.Timestamp createdAt = 2;
  optional google.protobuf.Timestamp updatedAt = 3;

  string name = 4;
  bool isPublic = 5;
  bool isFolder = 6;
  StorageObjectType type = 7;

  string userId = 8;
  optional string fileId = 9;
  optional string parentId = 10;

  oneof metadata {
    string folderPath = 11;
    string imageId = 12;
    string videoId = 13;
  }
}
