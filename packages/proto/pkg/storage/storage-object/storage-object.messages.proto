syntax = "proto3";

package storage.storage_object;

import "google/protobuf/timestamp.proto";

import "storage/storage-object/storage-object.proto";
import "storage/storage-object/storage-object.populates.proto";

// query

message StorageObjectQuery {
  optional string id = 1;
  repeated string ids = 2;
  optional StorageObjectType type = 3;
  optional string userId = 4;
  optional bool isPublic = 5;
  optional string parent = 6;
  optional string file = 7;
  optional string name = 8;
}

message StorageObjectQueryWeb {
  optional string id = 1;
  repeated string ids = 2;
  optional StorageObjectType type = 3;
  optional bool isPublic = 4;
  optional string parent = 5;
  optional string name = 6;
}

// types

message StorageObjectList {
  repeated StorageObjectPopulated items = 1;
  int32 total = 2;
}

message StorageObjectArray {
  repeated StorageObjectPopulated storageObjects = 1;
}

// get

message StorageObjectGet {
  optional StorageObjectQuery query = 1;
}

message StorageObjectGetFolders {
  optional string excludeChildrenOf = 1;
  string userId = 2;
}

message StorageObjectGetFoldersWeb {
  optional string excludeChildrenOf = 1;
}

// create

message StorageObjectCreate {
  string name = 1;
  bool isPublic = 2;
  optional string parent = 3;
  StorageObjectType type = 4;
  string userId = 5;

  optional string file = 6;
  optional string image = 7;
  optional string video = 8;
}

message StorageObjectCreateWeb {
  string name = 1;
  bool isPublic = 2;
  optional string parent = 3;
  StorageObjectType type = 4;

  optional string file = 5;
  optional string image = 6;
  optional string video = 7;
}

// update

message StorageObjectUpdateSet {
  optional string name = 1;
  optional bool isPublic = 2;
  optional string parent = 3;
}

message StorageObjectUpdate {
  optional StorageObjectUpdateSet set = 1;
}

message StorageObjectUpdateOne {
  StorageObjectQuery query = 1;
  StorageObjectUpdate update = 2;
}

message StorageObjectUpdateById {
  string id = 1;
  StorageObjectUpdate update = 2;
}
