syntax = 'proto3';

package auth.messages;

import "google/protobuf/timestamp.proto";

import "auth/models/user.proto";

message AuthLogin {
  string login = 1;
  string password = 2;
}

message AuthMe {
  string accessToken = 1;
}

message AuthRefresh {
  string refreshToken = 1;
}

message AuthToken {
  string value = 1;
  google.protobuf.Timestamp expireDate = 2;
}

message AuthTokens {
  AuthToken accessToken = 1;
  AuthToken refreshToken = 2;
}

message AuthData {
  models.User user = 1;
  AuthTokens tokens = 2;
}

message AuthStreamCode {
  string code = 1;
  google.protobuf.Timestamp expireDate = 2;
}
