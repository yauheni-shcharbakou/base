syntax = "proto3";

package auth;

import "common/service.proto";
import "auth/models/user.proto";
import "auth/messages/user.messages.proto";

service UserService {
  rpc getById (common.IdField) returns (models.User) {}
  rpc getOne (messages.UserRequest) returns (models.User) {}
  rpc getMany (messages.UserRequest) returns (messages.UserList) {}
  rpc getList (common.GetListRequest) returns (messages.UserGetListResponse) {}
  rpc createOne (messages.UserCreate) returns (models.User) {}
  rpc updateById (messages.UserUpdateByIdRequest) returns (models.User) {}
  rpc deleteById (common.IdField) returns (models.User) {}
}
