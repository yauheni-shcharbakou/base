syntax = 'proto3';

package storage;

import "common/service.proto";
import "storage/models/video.proto";
import "storage/messages/common.messages.proto";
import "storage/messages/video.messages.proto";

service VideoService {
  rpc getUrlMap (common.BaseQuery) returns (messages.UrlMap) {}
  rpc getDownloadMap (common.BaseQuery) returns (messages.DownloadMap) {}
  rpc getById (common.IdField) returns (messages.VideoPopulated) {}
  rpc getList (common.GetListRequest) returns (messages.VideoGetListResponse) {}
  rpc createOne (messages.VideoCreateRequest) returns (models.Video) {}
  rpc createMany (messages.VideoCreateManyRequest) returns (messages.VideoCreateManyResponse) {}
  rpc updateById (messages.VideoUpdateByIdRequest) returns (models.Video) {}
  rpc uploadOne (stream messages.UploadRequest) returns (stream messages.VideoUploadResponse) {}
  rpc deleteById (common.IdField) returns (models.Video) {}
}
