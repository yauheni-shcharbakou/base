syntax = 'proto3';

package storage.messages;

import "google/protobuf/timestamp.proto";

import "storage/models/file.proto";

// query

message FileQuery {
  optional string id = 1;
  repeated string ids = 2;
  optional string mimeType = 3;
  repeated string mimeTypes = 4;
  optional string userId = 5;
  repeated string userIds = 6;
  optional string extension = 7;
  optional models.FileUploadStatus uploadStatus = 8;
  repeated models.FileUploadStatus uploadStatuses = 9;
  optional google.protobuf.Timestamp createdAfter = 10;
}

message FileRequest {
  FileQuery query = 1;
}

// get

message FileGetListResponse {
  repeated models.File items = 1;
  int32 total = 2;
}

// create

message FileCreate {
  string originalName = 1;
  int32 size = 2;
  string mimeType = 3;
}

// upload

message FileUploadResponse {
  oneof payload {
    models.File entity = 1;
    bool canSendChunks = 2;
  }
}
