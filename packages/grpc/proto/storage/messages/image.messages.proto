// update

message ImageUpdateSet {
  optional string alt = 1;
}

message ImageUpdate {
  optional ImageUpdateSet set = 1;
}

message ImageUpdateRequest {
  ImageQuery query = 1;
  ImageUpdate update = 2;
}

message ImageUpdateByIdRequest {
  string id = 1;
  ImageUpdate update = 2;
}
