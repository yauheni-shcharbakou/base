syntax = 'proto3';

package storage.models;

import "google/protobuf/timestamp.proto";

message Video {
  string id = 1;
  google.protobuf.Timestamp createdAt = 2;
  optional google.protobuf.Timestamp updatedAt = 3;

  string user = 4;
  string file = 5;
  string providerId = 6;
  int32 duration = 7;
  int32 views = 8;
  optional string description = 9;
}
