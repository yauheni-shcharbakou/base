syntax = 'proto3';

package storage.models;

import "google/protobuf/timestamp.proto";

message Image {
  string id = 1;
  google.protobuf.Timestamp createdAt = 2;
  optional google.protobuf.Timestamp updatedAt = 3;

  string user = 4;
  string file = 5;
  int32 width = 6;
  int32 height = 7;
  string alt = 8;
}
