packages:
  - './backend/apps/*'
  - './backend/packages/*'
  - './frontend/apps/*'
  - './frontend/packages/*'
  - './packages/*'
allowBuilds:
  '@nestjs/core': true
  '@scarf/scarf': false
  bcrypt: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
overrides:
  axios: '1.16.0'
  lodash: '4.18.1'
  protobufjs: '7.6.3'
  '@grpc/grpc-js': '1.14.4'
  tmp: '0.2.7'
  ws: '8.21.0'
  'form-data': '4.0.6'
  'http-proxy-middleware': '3.0.7'
  multer: '2.2.0'
