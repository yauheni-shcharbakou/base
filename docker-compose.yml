  backend.auth:
    build:
      context: .
      dockerfile: ./backend/apps/auth/Dockerfile
    restart: unless-stopped
    container_name: base-backend-auth
    ports:
      - '8001:8001'
    environment:
      PORT: 8001
      NODE_ENV: production
      DATABASE_URL: postgresql://admin:password123@postgres:5432
      AUTH_GRPC_URL: 0.0.0.0:8001
      ACCESS_JWT_SECRET: string123
      REFRESH_JWT_SECRET: string123
      ADMIN_EMAIL: admin@gmail.com
      ADMIN_PASSWORD: string123
    networks:
      - private_network
    depends_on:
      - mongo
    profiles:
      - all

  backend.api-gateway:
    build:
      context: .
      dockerfile: ./backend/apps/api-gateway/Dockerfile
    restart: unless-stopped
    container_name: base-backend-api-gateway
    ports:
      - '${BACKEND_PORT:-5555}:5555'
    environment:
      PORT: 5555
      NODE_ENV: production
      API_GATEWAY_GRPC_URL: 0.0.0.0:8000
      AUTH_GRPC_URL: backend.auth:8001
    networks:
      - private_network
      - public_network
    depends_on:
      - backend.auth
    profiles:
      - all

  frontend.admin:
    build:
      context: .
      dockerfile: ./frontend/apps/admin/Dockerfile
    restart: unless-stopped
    container_name: base-frontend-admin
    ports:
      - '${ADMIN_PORT:-3336}:3336'
    environment:
      PORT: 3336
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      BACKEND_GRPC_URL: backend.api-gateway:8000
      DEFAULT_EMAIL: admin@gmail.com
      DEFAULT_PASSWORD: string123
      CHUNK_SIZE_MB: 1
    networks:
      - private_network
      - public_network
    depends_on:
      - mongo
      - backend.api-gateway
    profiles:
      - all

networks:
  private_network:
  public_network:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
  redis_data:
