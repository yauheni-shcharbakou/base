name: base

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    container_name: base-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      sh -c "docker-entrypoint.sh postgres &
      sleep 5;
      psql -U admin -d postgres -c 'CREATE DATABASE auth;';
      psql -U admin -d postgres -c 'CREATE DATABASE storage;';
      wait"
    networks:
      - private_network
      - public_network
    profiles:
      - local
      - all

  nats:
    image: nats:latest
    restart: unless-stopped
    container_name: base-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: [
      "-js",
      "-m", "8222",
      "-sd", "/data",
      "--name", "nats-node"
    ]
    volumes:
      - nats_data:/data
    profiles:
      - local
      - all

