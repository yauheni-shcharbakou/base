  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    container_name: base-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      sh -c "docker-entrypoint.sh postgres &
      sleep 5;
      psql -U admin -d postgres -c 'CREATE DATABASE auth;';
      psql -U admin -d postgres -c 'CREATE DATABASE storage;';
      wait"
    networks:
      - private_network
      - public_network
    profiles:
      - local
      - all

  postgres-ui:
    image: dpage/pgadmin4
    restart: unless-stopped
    container_name: base-postgres-ui
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: string123
    ports:
      - "8080:80"
    networks:
      - private_network
      - public_network
    depends_on:
      - postgres
    profiles:
      - local
      - all

#  redis:
